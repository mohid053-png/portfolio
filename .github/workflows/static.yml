<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohid Ali Khan Pathan — Systems Analyst & Software Engineer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #0a0f1e;
        --navy-mid: #111827;
        --navy-card: #141c2e;
        --navy-border: #1e2d45;
        --accent: #00d4ff;
        --accent2: #7c3aed;
        --accent3: #10b981;
        --gold: #f59e0b;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --white: #ffffff;
        --glow: 0 0 30px rgba(0, 212, 255, 0.15);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--navy);
        color: var(--text);
        line-height: 1.6;
        overflow-x: hidden;
      }

      /* ── NAV ── */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2.5rem;
        background: rgba(10, 15, 30, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 212, 255, 0.12);
      }
      .nav-logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }
      .nav-links {
        display: flex;
        gap: 2rem;
        list-style: none;
      }
      .nav-links a {
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: var(--accent);
      }

      /* ── HERO ── */
      .hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 8rem 2.5rem 4rem;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -200px;
        right: -100px;
        width: 700px;
        height: 700px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(0, 212, 255, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero::after {
        content: "";
        position: absolute;
        bottom: -100px;
        left: -100px;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(124, 58, 237, 0.06) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--accent);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .hero-tag::before {
        content: "";
        display: block;
        width: 32px;
        height: 1px;
        background: var(--accent);
      }
      .hero h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.8rem, 7vw, 5.5rem);
        font-weight: 900;
        line-height: 1.05;
        color: var(--white);
        margin-bottom: 0.25rem;
      }
      .hero h1 .name-accent {
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero-role {
        font-size: 1rem;
        font-weight: 400;
        color: var(--text-muted);
        letter-spacing: 0.02em;
        margin-bottom: 2rem;
        max-width: 560px;
        line-height: 1.7;
      }

      /* ── AWARD BANNER ── */
      .award-banner {
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        background: linear-gradient(
          135deg,
          rgba(245, 158, 11, 0.1),
          rgba(245, 158, 11, 0.05)
        );
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 12px;
        padding: 1rem 1.5rem;
        margin-bottom: 2.5rem;
        max-width: 520px;
      }
      .award-icon {
        font-size: 1.8rem;
        flex-shrink: 0;
      }
      .award-text strong {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.02em;
      }
      .award-text span {
        font-size: 0.78rem;
        color: #d97706;
        line-height: 1.4;
      }

      .hero-cta {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--accent);
        color: var(--navy);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 0.75rem 1.75rem;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.2s;
        border: none;
        cursor: pointer;
      }
      .btn-primary:hover {
        background: #38e5ff;
        transform: translateY(-2px);
      }
      .btn-outline {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: transparent;
        color: var(--accent);
        border: 1px solid rgba(0, 212, 255, 0.4);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 0.75rem 1.75rem;
        border-radius: 8px;
        text-decoration: none;
        transition: all 0.2s;
      }
      .btn-outline:hover {
        background: rgba(0, 212, 255, 0.08);
        transform: translateY(-2px);
      }

      .hero-stats {
        display: flex;
        gap: 3rem;
        margin-top: 4rem;
        padding-top: 3rem;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
      }
      .stat-item {
        text-align: left;
      }
      .stat-num {
        font-family: "Playfair Display", serif;
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--white);
        line-height: 1;
        display: block;
      }
      .stat-num .accent {
        color: var(--accent);
      }
      .stat-label {
        font-size: 0.75rem;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-top: 0.25rem;
        display: block;
      }

      /* ── SECTION BASE ── */
      section {
        padding: 6rem 2.5rem;
      }
      .section-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--accent);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .section-label::before {
        content: "";
        display: block;
        width: 24px;
        height: 1px;
        background: var(--accent);
      }
      .section-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.8rem, 4vw, 3rem);
        font-weight: 700;
        color: var(--white);
        margin-bottom: 1rem;
      }
      .section-sub {
        font-size: 0.95rem;
        color: var(--text-muted);
        max-width: 600px;
        line-height: 1.7;
      }

      /* ── ABOUT / SKILLS ── */
      .about-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        margin-top: 4rem;
        align-items: start;
      }
      .about-text p {
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.8;
        margin-bottom: 1.2rem;
      }
      .highlight {
        color: var(--accent);
        font-weight: 500;
      }

      .skills-grid {
        display: grid;
        gap: 1rem;
      }
      .skill-category {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        transition: border-color 0.2s;
      }
      .skill-category:hover {
        border-color: rgba(0, 212, 255, 0.3);
      }
      .skill-cat-title {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }
      .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .skill-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--text-muted);
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 5px;
        padding: 0.25rem 0.6rem;
      }

      /* ── EXPERIENCE ── */
      .exp-section {
        background: var(--navy-mid);
      }
      .timeline {
        margin-top: 4rem;
        position: relative;
      }
      .timeline::before {
        content: "";
        position: absolute;
        left: 1.5rem;
        top: 0;
        bottom: 0;
        width: 1px;
        background: linear-gradient(
          to bottom,
          var(--accent),
          rgba(0, 212, 255, 0),
          rgba(124, 58, 237, 0.5)
        );
      }
      .exp-item {
        display: grid;
        grid-template-columns: 3rem 1fr;
        gap: 2rem;
        margin-bottom: 3rem;
        position: relative;
      }
      .exp-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.15);
        margin-top: 0.45rem;
        flex-shrink: 0;
        justify-self: center;
      }
      .exp-dot.purple {
        background: var(--accent2);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
      }
      .exp-card {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 14px;
        padding: 1.75rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .exp-card:hover {
        border-color: rgba(0, 212, 255, 0.25);
        box-shadow: var(--glow);
      }
      .exp-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.4rem;
      }
      .exp-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
      }
      .exp-period {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        background: rgba(0, 212, 255, 0.08);
        border: 1px solid rgba(0, 212, 255, 0.2);
        border-radius: 5px;
        padding: 0.2rem 0.6rem;
        white-space: nowrap;
      }
      .exp-company {
        font-size: 0.82rem;
        color: var(--text-dim);
        margin-bottom: 1rem;
      }

      /* ── AWARD HIGHLIGHT ── */
      .exp-award {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: linear-gradient(
          135deg,
          rgba(245, 158, 11, 0.08),
          rgba(245, 158, 11, 0.03)
        );
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1rem;
      }
      .exp-award span {
        font-size: 0.82rem;
        color: #d97706;
        line-height: 1.4;
      }
      .exp-award strong {
        color: var(--gold);
      }

      .exp-bullets {
        list-style: none;
      }
      .exp-bullets li {
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.6;
        margin-bottom: 0.6rem;
        padding-left: 1rem;
        position: relative;
      }
      .exp-bullets li::before {
        content: "›";
        position: absolute;
        left: 0;
        color: var(--accent);
        font-weight: 700;
      }

      /* ── PROJECTS ── */
      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 1.5rem;
        margin-top: 4rem;
      }
      .project-card {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 14px;
        padding: 1.75rem;
        transition: all 0.25s;
        position: relative;
        overflow: hidden;
      }
      .project-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        opacity: 0;
        transition: opacity 0.2s;
      }
      .project-card:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: var(--glow);
      }
      .project-card:hover::before {
        opacity: 1;
      }
      .project-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.7rem;
        color: var(--text-dim);
        margin-bottom: 0.75rem;
      }
      .project-name {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
      }
      .project-sub {
        font-size: 0.78rem;
        color: var(--accent);
        margin-bottom: 1rem;
      }
      .project-desc {
        font-size: 0.83rem;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 1.25rem;
      }
      .project-metrics {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
      }
      .metric-badge {
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.25rem 0.6rem;
        border-radius: 5px;
      }
      .metric-green {
        background: rgba(16, 185, 129, 0.1);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .metric-blue {
        background: rgba(0, 212, 255, 0.08);
        color: var(--accent);
        border: 1px solid rgba(0, 212, 255, 0.2);
      }
      .metric-purple {
        background: rgba(124, 58, 237, 0.1);
        color: #a78bfa;
        border: 1px solid rgba(124, 58, 237, 0.2);
      }
      .tech-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .tech-pill {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        color: var(--text-dim);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 4px;
        padding: 0.2rem 0.55rem;
      }

      /* ── CERTIFICATIONS ── */
      .certs-section {
        background: var(--navy-mid);
      }
      .certs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.25rem;
        margin-top: 3rem;
      }
      .cert-card {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        transition: border-color 0.2s;
      }
      .cert-card:hover {
        border-color: rgba(0, 212, 255, 0.3);
      }
      .cert-logo {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, #ff9900, #ff6d00);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        font-weight: 700;
        color: white;
        letter-spacing: -0.02em;
      }
      .cert-logo.uipath {
        background: linear-gradient(135deg, #fa4616, #e84c1e);
      }
      .cert-name {
        font-size: 0.87rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.2rem;
      }
      .cert-issuer {
        font-size: 0.75rem;
        color: var(--text-dim);
        margin-bottom: 0.4rem;
      }
      .cert-valid {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.68rem;
        color: var(--accent3);
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 4px;
        padding: 0.15rem 0.5rem;
        display: inline-block;
      }

      /* ── PUBLICATIONS ── */
      .pub-list {
        margin-top: 3rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .pub-card {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-left: 3px solid var(--accent2);
        border-radius: 0 12px 12px 0;
        padding: 1.25rem 1.5rem;
        transition: border-color 0.2s;
      }
      .pub-card:hover {
        border-color: rgba(124, 58, 237, 0.5);
      }
      .pub-title {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.4rem;
      }
      .pub-venue {
        font-size: 0.78rem;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
      }
      .pub-doi {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        text-decoration: none;
      }
      .pub-doi:hover {
        text-decoration: underline;
      }

      /* ── CONTACT ── */
      .contact-section {
        text-align: center;
        padding: 8rem 2.5rem;
        position: relative;
        overflow: hidden;
      }
      .contact-section::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(0, 212, 255, 0.04) 0%,
          transparent 65%
        );
        pointer-events: none;
      }
      .contact-grid {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 3rem;
      }
      .contact-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 10px;
        padding: 0.9rem 1.5rem;
        text-decoration: none;
        transition: all 0.2s;
      }
      .contact-item:hover {
        border-color: rgba(0, 212, 255, 0.3);
        box-shadow: var(--glow);
        transform: translateY(-2px);
      }
      .contact-item-icon {
        font-size: 1.1rem;
      }
      .contact-item-text {
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* ── FOOTER ── */
      footer {
        border-top: 1px solid var(--navy-border);
        padding: 1.5rem 2.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
      }
      footer p {
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .footer-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
      }

      /* ── EDUCATION ── */
      .edu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1.25rem;
        margin-top: 3rem;
      }
      .edu-card {
        background: var(--navy-card);
        border: 1px solid var(--navy-border);
        border-radius: 12px;
        padding: 1.5rem;
        transition: border-color 0.2s;
      }
      .edu-card:hover {
        border-color: rgba(0, 212, 255, 0.25);
      }
      .edu-degree {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.2rem;
      }
      .edu-school {
        font-size: 0.8rem;
        color: var(--accent);
        margin-bottom: 0.6rem;
      }
      .edu-details {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.6;
      }
      .edu-gpa {
        display: inline-block;
        margin-top: 0.75rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--accent3);
        background: rgba(16, 185, 129, 0.08);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 5px;
        padding: 0.2rem 0.6rem;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        nav {
          padding: 1rem 1.25rem;
        }
        .nav-links {
          display: none;
        }
        section {
          padding: 4rem 1.25rem;
        }
        .hero {
          padding: 7rem 1.25rem 3rem;
        }
        .about-grid {
          grid-template-columns: 1fr;
          gap: 2rem;
        }
        .hero-stats {
          gap: 1.5rem;
        }
        footer {
          flex-direction: column;
          text-align: center;
        }
      }

      /* ── SCROLL ANIMATION ── */
      .fade-in {
        opacity: 0;
        transform: translateY(24px);
        transition:
          opacity 0.6s ease,
          transform 0.6s ease;
      }
      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }
    
/* Cursor Animation */
body{cursor:none;}
.cursor-dot{
width:8px;height:8px;background:#00d4ff;border-radius:50%;
position:fixed;pointer-events:none;z-index:99999;
