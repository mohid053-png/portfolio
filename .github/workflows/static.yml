    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
              setTimeout(() => entry.target.classList.add("visible"), i * 80);
            }
          });
        },
        { threshold: 0.1 },
      );

      document
        .querySelectorAll(".fade-in")
        .forEach((el) => observer.observe(el));
    </script>
  
<script>
const dot=document.querySelector('.cursor-dot');
const ring=document.querySelector('.cursor-ring');
let mouseX=0,mouseY=0;

window.addEventListener('mousemove',e=>{
mouseX=e.clientX; mouseY=e.clientY;
dot.style.left=mouseX+'px';
dot.style.top=mouseY+'px';
});

function animateRing(){
const currentX=parseFloat(ring.style.left)||mouseX;
const currentY=parseFloat(ring.style.top)||mouseY;
ring.style.left=(currentX+(mouseX-currentX)*0.15)+'px';
ring.style.top=(currentY+(mouseY-currentY)*0.15)+'px';
requestAnimationFrame(animateRing);
}
animateRing();

document.querySelectorAll('a,button,.project-card,.exp-card,.cert-card,.edu-card')
.forEach(el=>{
el.addEventListener('mouseenter',()=>ring.classList.add('cursor-hover'));
el.addEventListener('mouseleave',()=>ring.classList.remove('cursor-hover'));
});
</script>

